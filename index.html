<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRPG Infinite Canvas</title>
  </head>
  <body>
    <div id="app">
      <canvas id="world-canvas" aria-label="无限 2D 跑团画布"></canvas>

      <section id="identity-screen" class="identity-screen" aria-label="身份选择界面">
        <div class="identity-card">
          <p class="panel-eyebrow">进入场景</p>
          <h1>选择身份</h1>
          <p class="identity-description">主持人可以编辑地图；玩家只能进入游玩模式并操作自己的角色。</p>
          <div id="identity-list" class="identity-list"></div>
        </div>
      </section>

      <header class="toolbar" aria-label="画布工具栏">
        <label class="mode-select-label">
          模式
          <select id="mode-select" class="mode-select">
            <option value="edit">编辑模式</option>
            <option value="play">主持模式</option>
          </select>
        </label>
        <label class="mode-select-label edit-mode-select-label">
          编辑
          <select id="edit-mode-select" class="mode-select">
            <option value="art">美术地图</option>
            <option value="logic">逻辑地图</option>
          </select>
        </label>
        <label id="upload-button" class="tool-button upload-button">
          上传图片
          <input id="image-upload" type="file" accept="image/*" multiple />
        </label>
        <button id="add-token-button" type="button" class="tool-button" aria-pressed="false">放置角色</button>
        <button id="delete-token-button" type="button" class="tool-button destructive-button" aria-pressed="false">删除角色</button>
        <button id="wall-mode-button" type="button" class="tool-button" aria-pressed="false">编辑阻挡边</button>
        <button id="door-mode-button" type="button" class="tool-button" aria-pressed="false">编辑门</button>
        <button id="clear-walls-button" type="button" class="tool-button subtle-button">清空阻挡边</button>
        <button id="switch-identity-button" type="button" class="tool-button subtle-button">切换身份</button>
        <span id="identity-badge" class="identity-badge">未登录</span>
        <span class="hint">右键拖动画布移动相机 · 滚轮缩放画面 · 编辑模式：美术地图/逻辑地图 · 主持/游玩模式：拖拽角色，双击角色检视，主持人点击门检视</span>
      </header>

      <div id="drop-overlay" class="drop-overlay" hidden>松开以上传图片</div>

      <aside id="selection-panel" class="selection-panel" aria-hidden="true">
        <div class="panel-eyebrow" id="selection-eyebrow">图片检视</div>
        <div class="selection-title" id="selection-title">图片</div>
        <div id="image-selection-controls">
          <button id="reset-size" type="button" class="primary-panel-action">还原尺寸</button>
        </div>
        <div id="image-selection-actions" class="selection-actions">
          <button id="layer-up" type="button">上移层级</button>
          <button id="layer-down" type="button">下移层级</button>
          <button id="layer-top" type="button">置顶</button>
          <button id="layer-bottom" type="button">置底</button>
        </div>
        <form id="token-selection-form" class="token-selection-form" hidden>
          <div id="token-name-display" class="token-name-display">
            <span id="token-name-value" class="token-name-value">角色</span>
            <button id="edit-token-name" class="icon-panel-action" type="button" aria-label="编辑角色姓名">✎</button>
          </div>
          <label id="token-name-field" class="panel-field" hidden>
            <span>角色姓名</span>
            <input id="token-name-input" type="text" maxlength="24" autocomplete="off" />
          </label>
          <div class="panel-section">
            <div class="panel-section-title">角色头像</div>
            <label id="avatar-upload-button" class="primary-panel-action avatar-upload-button">
              上传头像
              <input id="avatar-upload-input" type="file" accept="image/*" />
            </label>
            <div id="avatar-adjust-controls" class="avatar-adjust-controls" hidden>
              <button id="edit-avatar" type="button">编辑头像裁剪</button>
              <button id="reset-avatar-adjustment" type="button">重置头像位置</button>
            </div>
          </div>
          <p id="token-panel-help" class="panel-help">修改后会同步到所有客户端。</p>
        </form>
        <form id="door-selection-form" class="door-selection-form" hidden>
          <label class="door-state-toggle">
            <input id="door-blocks-movement-input" type="checkbox" />
            <span>关闭门，并阻挡角色移动</span>
          </label>
          <p id="door-panel-help" class="panel-help">打开的门默认不阻挡移动；关闭后会像阻挡边一样影响寻路。</p>
        </form>
      </aside>

      <section id="avatar-editor-overlay" class="avatar-editor-overlay" hidden aria-label="头像裁剪编辑器">
        <div class="avatar-editor-card">
          <p class="panel-eyebrow">头像裁剪</p>
          <h2>调整角色头像</h2>
          <p class="avatar-editor-help">拖动图片调整位置，滚轮缩放。圆圈外区域不会出现在棋子头像中。</p>
          <div id="avatar-editor-stage" class="avatar-editor-stage">
            <img id="avatar-editor-image" alt="待裁剪头像" draggable="false" />
            <div class="avatar-editor-mask" aria-hidden="true"></div>
          </div>
          <div class="avatar-editor-actions">
            <button id="cancel-avatar-edit" type="button">取消</button>
            <button id="save-avatar-edit" type="button">保存头像</button>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

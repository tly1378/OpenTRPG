<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRPG Infinite Canvas</title>
  </head>
  <body>
    <div id="app">
      <canvas id="world-canvas" aria-label="无限 2D 跑团画布"></canvas>

      <section id="identity-screen" class="identity-screen" aria-label="身份选择界面">
        <div class="identity-card">
          <p class="panel-eyebrow">进入场景</p>
          <h1>选择身份</h1>
          <p class="identity-description">主持人可以编辑地图；玩家只能进入游玩模式并操作自己的角色。</p>
          <div id="identity-list" class="identity-list"></div>
        </div>
      </section>

      <header class="toolbar" aria-label="画布工具栏">
        <label class="mode-select-label">
          模式
          <select id="mode-select" class="mode-select">
            <option value="edit">编辑模式</option>
            <option value="play">主持模式</option>
          </select>
        </label>
        <label class="mode-select-label edit-mode-select-label">
          编辑
          <select id="edit-mode-select" class="mode-select">
            <option value="background">美术地图</option>
            <option value="blocking">逻辑地图</option>
          </select>
        </label>
        <label id="upload-button" class="tool-button upload-button" aria-label="上传图片" data-tooltip="上传图片">
          <span data-lucide="upload" aria-hidden="true"></span>
          <input id="image-upload" type="file" accept="image/*" multiple />
        </label>
        <button id="wall-mode-button" type="button" class="tool-button" aria-label="编辑阻挡边" aria-pressed="false" data-tooltip="编辑阻挡边">
          <span data-lucide="brick-wall" aria-hidden="true"></span>
        </button>
        <button id="door-mode-button" type="button" class="tool-button" aria-label="编辑门" aria-pressed="false" data-tooltip="编辑门">
          <span data-lucide="door-open" aria-hidden="true"></span>
        </button>
        <button id="room-mode-button" type="button" class="tool-button" aria-label="设置房间" aria-pressed="false" data-tooltip="设置房间">
          <span data-lucide="land-plot" aria-hidden="true"></span>
        </button>
        <button id="clear-walls-button" type="button" class="tool-button destructive-button" aria-label="清空" data-tooltip="清空">
          <span data-lucide="eraser" aria-hidden="true"></span>
        </button>
        <button id="logic-map-visibility-button" type="button" class="tool-button subtle-button" aria-label="隐藏逻辑地图" aria-pressed="true" data-tooltip="隐藏逻辑地图">
          <span data-lucide="eye-off" aria-hidden="true"></span>
        </button>
        <div class="right-toolbar" aria-label="右侧快捷工具">
          <button id="switch-identity-button" type="button" class="tool-button subtle-button" aria-label="切换身份" data-tooltip="切换身份">
            <span data-lucide="refresh-cw" aria-hidden="true"></span>
          </button>
          <button id="chat-toggle-button" type="button" class="tool-button subtle-button is-hidden" aria-label="打开聊天" aria-pressed="false" data-tooltip="聊天">
            <span data-lucide="message-circle" aria-hidden="true"></span>
          </button>
          <button id="character-toggle-button" type="button" class="tool-button subtle-button is-hidden" aria-label="打开角色管理" aria-pressed="false" data-tooltip="角色">
            <span data-lucide="users" aria-hidden="true"></span>
          </button>
        </div>
        <span id="identity-badge" class="identity-badge">未登录</span>
      </header>

      <aside id="dice-panel" class="dice-panel" aria-label="骰子投掷器" hidden>
        <div class="dice-panel-heading">
          <h2>投骰子</h2>
          <button id="dice-clear" class="dice-clear-button" type="button">清空</button>
        </div>
        <div id="dice-options" class="dice-options" aria-label="选择要投掷的骰子">
          <div class="dice-control">
            <button class="dice-adjust-button" type="button" data-die="4" data-dice-action="decrease" aria-label="减少 d4">-</button>
            <button class="dice-option" type="button" data-die="4">d4</button>
            <button class="dice-adjust-button" type="button" data-die="4" data-dice-action="increase" aria-label="增加 d4">+</button>
          </div>
          <div class="dice-control">
            <button class="dice-adjust-button" type="button" data-die="6" data-dice-action="decrease" aria-label="减少 d6">-</button>
            <button class="dice-option" type="button" data-die="6">d6</button>
            <button class="dice-adjust-button" type="button" data-die="6" data-dice-action="increase" aria-label="增加 d6">+</button>
          </div>
          <div class="dice-control">
            <button class="dice-adjust-button" type="button" data-die="8" data-dice-action="decrease" aria-label="减少 d8">-</button>
            <button class="dice-option" type="button" data-die="8">d8</button>
            <button class="dice-adjust-button" type="button" data-die="8" data-dice-action="increase" aria-label="增加 d8">+</button>
          </div>
          <div class="dice-control">
            <button class="dice-adjust-button" type="button" data-die="10" data-dice-action="decrease" aria-label="减少 d10">-</button>
            <button class="dice-option" type="button" data-die="10">d10</button>
            <button class="dice-adjust-button" type="button" data-die="10" data-dice-action="increase" aria-label="增加 d10">+</button>
          </div>
          <div class="dice-control">
            <button class="dice-adjust-button" type="button" data-die="12" data-dice-action="decrease" aria-label="减少 d12">-</button>
            <button class="dice-option" type="button" data-die="12">d12</button>
            <button class="dice-adjust-button" type="button" data-die="12" data-dice-action="increase" aria-label="增加 d12">+</button>
          </div>
          <div class="dice-control">
            <button class="dice-adjust-button" type="button" data-die="20" data-dice-action="decrease" aria-label="减少 d20">-</button>
            <button class="dice-option" type="button" data-die="20">d20</button>
            <button class="dice-adjust-button" type="button" data-die="20" data-dice-action="increase" aria-label="增加 d20">+</button>
          </div>
          <div class="dice-control">
            <button class="dice-adjust-button" type="button" data-die="100" data-dice-action="decrease" aria-label="减少 d100">-</button>
            <button class="dice-option" type="button" data-die="100">d100</button>
            <button class="dice-adjust-button" type="button" data-die="100" data-dice-action="increase" aria-label="增加 d100">+</button>
          </div>
          <label class="dice-modifier-field">
            <span class="dice-modifier-label">加值</span>
            <span class="dice-modifier-control">
              <button id="dice-modifier-decrease" class="dice-adjust-button" type="button" aria-label="减少加值">-</button>
              <input id="dice-modifier" type="number" inputmode="numeric" step="1" value="0" aria-label="投掷加值" />
              <button id="dice-modifier-increase" class="dice-adjust-button" type="button" aria-label="增加加值">+</button>
            </span>
          </label>
        </div>
        <button id="dice-roll" class="dice-roll-button" type="button" disabled>投掷</button>
      </aside>

      <div id="drop-overlay" class="drop-overlay" hidden>松开以上传图片</div>

      <aside id="chat-panel" class="chat-panel" aria-label="聊天栏" aria-hidden="true">
        <div class="chat-panel-header">
          <div>
            <p class="panel-eyebrow">聊天</p>
            <h2>聊天栏</h2>
          </div>
          <button id="chat-close-button" class="chat-close-button" type="button" aria-label="关闭聊天">关闭</button>
        </div>
        <div id="chat-message-list" class="chat-message-list" aria-live="polite">
          <div class="chat-empty">投骰结果会显示在这里。</div>
        </div>
      </aside>

      <aside id="character-panel" class="character-panel" aria-label="角色管理栏" aria-hidden="true" hidden>
        <div class="character-panel-header">
          <div>
            <p class="panel-eyebrow">角色</p>
            <h2>角色管理</h2>
          </div>
          <button id="character-close-button" class="chat-close-button" type="button" aria-label="关闭角色管理">关闭</button>
        </div>
        <button id="add-character-button" type="button" class="primary-panel-action">添加角色</button>
        <div id="character-list" class="character-list" aria-live="polite">
          <div class="character-empty">还没有角色。</div>
        </div>
        <p class="panel-help">管理员可将角色拖入地图生成棋子；NPC 无法登录，仅主持人可操控。</p>
      </aside>

      <aside id="selection-panel" class="selection-panel" aria-hidden="true">
        <div class="panel-eyebrow" id="selection-eyebrow">图片检视</div>
        <div class="selection-title" id="selection-title">图片</div>
        <div id="image-selection-controls">
          <button id="reset-size" type="button" class="primary-panel-action">还原尺寸</button>
        </div>
        <div id="image-selection-actions" class="selection-actions">
          <button id="layer-up" type="button">上移层级</button>
          <button id="layer-down" type="button">下移层级</button>
          <button id="layer-top" type="button">置顶</button>
          <button id="layer-bottom" type="button">置底</button>
        </div>
        <div id="image-selection-danger" class="image-selection-danger">
          <button id="delete-image" type="button" class="destructive-panel-action">删除图片</button>
        </div>
        <form id="door-selection-form" class="door-selection-form" hidden>
          <label class="door-state-toggle">
            <input id="door-blocks-movement-input" type="checkbox" />
            <span>关闭门，并阻挡角色移动</span>
          </label>
          <p id="door-panel-help" class="panel-help">打开的门默认不阻挡移动；关闭后会像阻挡边一样影响寻路。</p>
        </form>
        <form id="room-selection-form" class="room-selection-form" hidden>
          <label class="panel-field">
            <span>房间名称</span>
            <input id="room-name-input" type="text" maxlength="32" autocomplete="off" placeholder="输入房间名称" />
          </label>
          <div class="room-selection-danger">
            <button id="delete-room" type="button" class="destructive-panel-action">删除房间</button>
          </div>
          <p id="room-panel-help" class="panel-help">名称会以大号半透明字体显示在地图上。</p>
        </form>
      </aside>

      <section id="token-inspector-overlay" class="token-inspector-overlay" hidden aria-label="角色检视面板">
        <div class="token-inspector-card">
          <div class="token-inspector-header">
            <div>
              <p class="panel-eyebrow">角色检视</p>
            </div>
            <button id="close-token-inspector" class="chat-close-button" type="button" aria-label="关闭角色检视">关闭</button>
          </div>
          <form id="token-selection-form" class="token-selection-form">
            <div id="token-name-display" class="token-name-display">
              <span id="token-name-value" class="token-name-value">角色</span>
              <input id="token-name-input" class="token-name-inline-input" type="text" maxlength="24" autocomplete="off" hidden />
              <button id="edit-token-name" class="icon-panel-action" type="button" aria-label="编辑角色姓名">✎</button>
            </div>
            <div id="token-npc-type-controls" class="token-npc-type-controls" hidden>
              <label class="door-state-toggle">
                <input id="token-npc-type-input" type="checkbox" />
                <span>NPC 角色（无法登录，仅主持人可操控）</span>
              </label>
            </div>
            <div class="panel-section">
              <div class="panel-section-title">角色头像</div>
              <label id="avatar-upload-button" class="primary-panel-action avatar-upload-button">
                上传头像
                <input id="avatar-upload-input" type="file" accept="image/*" />
              </label>
              <div id="avatar-adjust-controls" class="avatar-adjust-controls" hidden>
                <button id="edit-avatar" type="button">编辑头像裁剪</button>
                <button id="reset-avatar-adjustment" type="button">重置头像位置</button>
              </div>
            </div>
            <div id="token-instance-actions" class="token-instance-actions" hidden>
              <button id="delete-token-instance" type="button" class="destructive-panel-action">删除棋子</button>
            </div>
            <p id="token-panel-help" class="panel-help">修改后会同步到所有客户端。</p>
          </form>
        </div>
      </section>

      <section id="avatar-editor-overlay" class="avatar-editor-overlay" hidden aria-label="头像裁剪编辑器">
        <div class="avatar-editor-card">
          <p class="panel-eyebrow">头像裁剪</p>
          <h2>调整角色头像</h2>
          <p class="avatar-editor-help">拖动图片调整位置，滚轮缩放。圆圈外区域不会出现在棋子头像中。</p>
          <div id="avatar-editor-stage" class="avatar-editor-stage">
            <img id="avatar-editor-image" alt="待裁剪头像" draggable="false" />
            <div class="avatar-editor-mask" aria-hidden="true"></div>
          </div>
          <div class="avatar-editor-actions">
            <button id="cancel-avatar-edit" type="button">取消</button>
            <button id="save-avatar-edit" type="button">保存头像</button>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
